{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="{% static 'web/favicon.svg' %}" type="image/svg+xml" />
  <link rel="stylesheet" href="{% static 'web/studio.css' %}" />
  <title>{% block title %}AI Ads Studio{% endblock %}</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="{% url 'api-config-js' %}"></script>
  <script src="{% static 'web/ui.js' %}"></script>
  <script src="{% static 'web/product.js' %}"></script>
  <script src="{% static 'web/auth.js' %}"></script>
  {% block extra_head %}{% endblock %}
</head>
<body class="{% block body_class %}bg-gray-50 min-h-screen{% endblock %}">
  {% block body %}{% endblock %}
  {% block extra_js %}{% endblock %}
</body>
</html>
