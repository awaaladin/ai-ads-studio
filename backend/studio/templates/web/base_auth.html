{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="{% static 'web/favicon.svg' %}" type="image/svg+xml">
  <title>{% block title %}AI Ads Studio{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { syne: ['Syne', 'sans-serif'], dm: ['DM Sans', 'sans-serif'] },
          colors: {
            navy: { DEFAULT: '#0d1117', mid: '#131b2e', card: '#1a2438', border: '#243050' },
            blue: { accent: '#2563eb', hover: '#1d4ed8' },
          },
        }
      }
    }
  </script>
  <link rel="stylesheet" href="{% static 'web/studio.css' %}">
  <style>
    body { font-family: 'DM Sans', sans-serif; }
    .hero-glow-top::before {
      content: '';
      position: absolute;
      top: -120px; right: -120px;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(37,99,235,.18) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-glow-bottom::after {
      content: '';
      position: absolute;
      bottom: -80px; left: -60px;
      width: 350px; height: 350px;
      background: radial-gradient(circle, rgba(99,37,235,.1) 0%, transparent 70%);
      pointer-events: none;
    }
  </style>
  <script src="{% url 'api-config-js' %}"></script>
  <script src="{% static 'web/ui.js' %}"></script>
  <script src="{% static 'web/auth.js' %}"></script>
  {% block extra_head %}{% endblock %}
</head>
<body class="{% block body_class %}min-h-screen bg-navy text-white{% endblock %}">
  {% block body %}{% endblock %}
  <script>
    if (typeof window.switchPage !== "function") {
      window.switchPage = function (page) {
        if (page === "signup") {
          window.location.href = "/signup/";
          return false;
        }
        if (page === "login") {
          window.location.href = "/signin/";
          return false;
        }
        return false;
      };
    }
    function togglePw(id, btn) {
      var inp = document.getElementById(id);
      if (!inp) return;
      var show = inp.type === "password";
      inp.type = show ? "text" : "password";
    }
  </script>
  {% block extra_js %}{% endblock %}
</body>
</html>
